
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#5e81f4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Attenda" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2995/2995620.png">
    
    <title>Attenda | Smart School Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Polyfill for process.env to prevent ReferenceError in browser
      window.process = {
        env: {
          API_KEY: '' // API Key must be injected here or via build process
        }
      };

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
            },
            screens: {
              'xs': '475px',
            },
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
        background-color: #f8fafc;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      
      /* Mobile Optimizations */
      @media screen and (max-width: 768px) {
        input, select, textarea {
          font-size: 16px !important; /* Prevent iOS Zoom */
        }
      }

      /* Global Modern Scrollbar Styling */
      ::-webkit-scrollbar {
          width: 6px;
          height: 6px;
      }
      ::-webkit-scrollbar-track {
          background: transparent;
      }
      ::-webkit-scrollbar-thumb {
          background: #cbd5e1;
          border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
          background: #94a3b8;
      }
      .dark ::-webkit-scrollbar-thumb {
          background: #334155;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
          background: #475569;
      }

      /* Specific sidebar scrollbar styling to be more visible when needed */
      .custom-scrollbar::-webkit-scrollbar {
          width: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(255, 255, 255, 0.15);
          border-radius: 10px;
      }
      .custom-scrollbar:hover::-webkit-scrollbar-thumb {
          background: rgba(255, 255, 255, 0.3);
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
          background-color: #334155;
      }
      .dark .custom-scrollbar:hover::-webkit-scrollbar-thumb {
          background-color: #475569;
      }
    </style>
